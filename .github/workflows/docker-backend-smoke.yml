name: Docker / backend smoke

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: websiteprofiling
          POSTGRES_PASSWORD: websiteprofiling
          POSTGRES_DB: websiteprofiling
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U websiteprofiling"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Pytest API surface (SQLite)
        run: cd backend && pytest tests/test_v1_surface.py -q

      - name: Start uvicorn (backend)
        env:
          DATABASE_URL: postgresql+asyncpg://websiteprofiling:websiteprofiling@localhost:5432/websiteprofiling
          REDIS_URL: redis://localhost:6379
        run: |
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/health
          python - <<'PY'
          import json, urllib.request
          with urllib.request.urlopen("http://127.0.0.1:8000/openapi.json") as r:
              d = json.load(r)
          assert d.get("openapi")
          assert len(d.get("paths", {})) > 0
          print("openapi paths:", len(d["paths"]))
          PY

      - name: Docker build backend image
        run: docker build -t websiteprofiling-backend:test ./backend
